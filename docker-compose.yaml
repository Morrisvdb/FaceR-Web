version: '1.0'

services:
  web:
    build: .
    ports:
      - "5000:443"
    volumes:
      - ./web:/app
    depends_on:
      - db
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=mysql://root:${MYSQL_ROOT_PASSWORD}@db:5432/mydb
  db:
    image: mariadb:latest
    ports:
      - "5432:5432"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8080:80"
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=${MYSQL_ROOT_PASSWORD}